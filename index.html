<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pikmin 花朵地圖</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-73XDC0059Z"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());

  gtag("config", "G-73XDC0059Z");
</script>

  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#81c784">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="花朵地圖">
<link rel="apple-touch-icon" href="icon.svg">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

<div id="floatingButtons">
  <button id="locateButton" onclick="centerToGps()">📍定位</button>
  <button id="routeButton" onclick="openPanel('route')">路線</button>
  <button id="flowerButton" onclick="openPanel('flowers')">花朵</button>
  <button id="moreButton" onclick="toggleMoreMenu()">更多</button>

  <div id="moreMenu" class="more-menu hidden">
    <button id="helpButton" onclick="showHelp()">說明</button>
    <button id="reportButton" onclick="openReportForm()">回報建議</button>
    <button id="cycleButton" onclick="setFlowerCycleHours()">週期設定</button>
    <button id="backupButton" onclick="exportBackup()">備份</button>
    <button id="shareButton" onclick="shareBackupText()">分享</button>
    <button id="importButton" onclick="triggerImportBackup()">匯入</button>
  </div>
</div>

<input
  type="file"
  id="importBackupInput"
  accept="application/json"
  style="display: none;"
/>

<div id="updateTimeModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="updateTimeTitle">更新時間</h3>

    <p class="modal-help">
      請輸入新的剩餘時間，例如 2200 或 22:00。<br>
      如果目前倒數時間正確，請留空直接按確定，即可標記為已確認。
    </p>

   <input
  type="tel"
  id="updateTimeInput"
  placeholder="例如 2200 或 22:00"
  inputmode="numeric"
  enterkeyhint="done"
/>

    <div class="modal-actions">
      <button onclick="submitUpdateTime()">確定</button>
      <button onclick="closeUpdateTimeModal()">取消</button>
    </div>
  </div>
</div>

<div id="bottomPanel" class="panel-closed">
<div id="panelHeader">
  <div>
    <h2 id="panelTitle">路線</h2>
    <div id="panelStats">共 0 點</div>
  </div>
  <span id="versionLabel">皮克敏花朵地圖 v0.7.1｜by DL</span>
</div>

<div id="routePanel" class="panel-section">
  <div id="routeHeader">
    <strong>路線</strong>
    <div class="route-header-actions">
      <button onclick="openGoogleMapsRoute()">Google導航</button>
      <button onclick="clearRoute()">清空路線</button>
    </div>
  </div>
  <div id="routeList"></div>
</div>

<div id="flowerPanel" class="panel-section">
  <div id="flowerTools">
    <input
      type="text"
      id="flowerSearchInput"
      placeholder="搜尋花點或備註"
      oninput="handleFlowerSearchInput()"
    />

    <select id="flowerSortSelect" onchange="handleFlowerSortChange()">
      <option value="time">依結束時間</option>
      <option value="distance">依距離</option>
      <option value="confirmed">依人工確認</option>
    </select>

    <select id="flowerGroupFilterSelect" onchange="handleFlowerGroupFilterChange()">
  <option value="all">全部</option>
  <option value="A">A組</option>
  <option value="B">B組</option>
  <option value="C">C組</option>
  <option value="ungrouped">待分組</option>
</select>

  </div>

  <div id="flowerList"></div>
</div>
</div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js?v=0.7.1"></script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(function (error) {
      console.warn("Service Worker 註冊失敗", error);
    });
  }
</script>
</body>
</html>
